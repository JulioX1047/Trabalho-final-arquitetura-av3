<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RPG - Personagens</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: #e94560; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-criar { background: #e94560; color: white; width: 100%; }
        .btn-batalha { background: #0f3460; color: white; }
        .personagem-card { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
        .stat { background: #0f3460; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        #mensagem { text-align: center; color: #00ff00; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ Meus Personagens</h1>

        <div style="background:#16213e; padding:20px; border-radius:10px; margin-bottom:20px;">
            <h3>Criar Novo Personagem</h3>
            <input type="text" id="nome" placeholder="Nome do personagem" />
            <select id="classe">
                <option value="GUERREIRO">⚔️ Guerreiro</option>
                <option value="MAGO">🔮 Mago</option>
                <option value="FURTIVO">🗡️ Furtivo</option>
            </select>
            <input type="number" id="usuarioId" placeholder="ID do usuário" value="1" />
            <button class="btn-criar" onclick="criarPersonagem()">Criar Personagem</button>
            <p id="mensagem"></p>
        </div>

        <h3>Personagens Cadastrados</h3>
        <div id="lista-personagens"></div>
    </div>
    <script src="personagem.js"></script>
</body>
</html>
